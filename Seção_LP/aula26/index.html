<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    
    <section class="container">
        <h1>Tabela IMC</h1>

        <section class="container-2">
        <ul>
            <h4>IMC</h4>
            <li>Entre 2 e 18,5</li>
            <li>Entre 18,5 e 24,9</li>
            <li>Entre 25 e 29,9</li>
            <li>Entre 30 e 34,9</li>
            <li>Entre 35 e 39,9</li>
            <li>Maior que 40</li>
        </ul>

        <ul>
            <h4>Classificação</h4>
            <li>Abaixo do peso</li>
            <li>Peso normal</li>
            <li>Sobrepeso</li>
            <li>Obesidade grau I</li>
            <li>Obesidade grau II</li>
            <li>Obesidade grau III</li>
        </ul>
        </section>

        <br>

        <form action="" method="POST" id="formulario">
            <label for="input-peso">Peso</label>
            <input type="text" id="peso" placeholder="Ex: 60 (em kg)">

            <label for="input-altura">Altura</label>
            <input type="text" id="altura" placeholder="Ex: 1.60 (em metros)">      

            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </section>

    <script src="./assets/js/main.js"></script>
</body>
</html>
