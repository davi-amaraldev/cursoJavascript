<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Simples</title>
</head>
<body>
    
    <form class="form">
        <p>Seu nome: <input type="text" class="nome"></p>
        <p>Sua idade: <input type="text" class="idade"></p>
        <p>Seu peso: <input type="text" class="peso"></p>
        <p>Sua altura: <input type="text" class="altura"></p>
        <button type="submit">Enviar</button>
    </form>

    <div class="resultado"></div>

    <script src="js/script.js"></script>
</body>
</html>
